apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todo-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: 'https://github.com/delavenka/project.git'
    path: todo-chart
    targetRevision: master

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: todo-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

  
